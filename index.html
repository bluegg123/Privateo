<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scholar's Log | JEE 2027</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        body{background:#07090f;-webkit-tap-highlight-color:transparent;}
        ::-webkit-scrollbar{width:2px;}
        ::-webkit-scrollbar-thumb{background:rgba(212,168,83,0.2);}
        input[type=range]{-webkit-appearance:none;height:4px;border-radius:2px;background:rgba(255,255,255,0.1);}
        input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#d4a853;cursor:pointer;}
        textarea{outline:none;}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.45}}
        @keyframes sp{to{transform:rotate(360deg)}}
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- POLYFILL FOR PERSISTENCE ON ANDROID BROWSER ---
        // This ensures the code's "store" logic works with standard mobile storage
        window.storage = {
            get: (k) => Promise.resolve({ value: localStorage.getItem(k) }),
            set: (k, v) => localStorage.setItem(k, v)
        };

        const JEE_DATE = new Date("2027-05-18T09:00:00+05:30");

        const SCHEDULE = [
            {id:"w",  g:"M", t:"5:00–5:15",  label:"Wake up & prep",            ico:"🌅"},
            {id:"s1", g:"M", t:"5:15–7:15",  label:"Study Block 1 — Hardest",   ico:"📚"},
            {id:"bf", g:"M", t:"7:15–7:30",  label:"Breakfast",                 ico:"🍳"},
            {id:"s2", g:"M", t:"7:30–9:00",  label:"Study Block 2 — Medium",    ico:"📚"},
            {id:"cl", g:"M", t:"9:00–3:00",  label:"Classes",                   ico:"🏫"},
            {id:"sn", g:"A", t:"3:00–3:20",  label:"Snack + decompress",        ico:"🍎"},
            {id:"np", g:"A", t:"3:20–4:00",  label:"Nap (max 40 min)",          ico:"😴"},
            {id:"s3", g:"A", t:"4:00–5:30",  label:"Study Block 3 — Notes",     ico:"📚"},
            {id:"s4", g:"A", t:"5:30–6:15",  label:"Study Block 4 — Flashcards",ico:"📖"},
            {id:"wd", g:"A", t:"6:15–6:30",  label:"Wind down",                 ico:"🌿"},
            {id:"dn", g:"A", t:"6:30–7:15",  label:"Dinner",                    ico:"🍽️"},
            {id:"pl", g:"E", t:"7:15–7:45",  label:"Plan tomorrow",             ico:"📋"},
            {id:"ph", g:"E", t:"9:15",       label:"Phone down",                ico:"📵"},
            {id:"sl", g:"E", t:"10:00",      label:"Sleep",                     ico:"🌙"},
        ];

        const GROUPS = { M:{label:"Morning",col:"#d4a853"}, A:{label:"Afternoon",col:"#7bc4a0"}, E:{label:"Evening",col:"#9b8fc4"} };

        const POMODOROS = [
            {label:"25/5",  work:25*60, brk:5*60},
            {label:"50/10", work:50*60, brk:10*60},
            {label:"90/20", work:90*60, brk:20*60},
            {label:"15/3",  work:15*60, brk:3*60},
        ];

        const MOODS = [
            {id:"rain",label:"Rainfall",   ico:"🌧️",col:"#7bc4a0"},
            {id:"fire",label:"Fireplace",  ico:"🔥",col:"#d4a853"},
            {id:"frst",label:"Forest",     ico:"🌿",col:"#5db870"},
            {id:"cafe",label:"Café Noise", ico:"☕",col:"#c49b7b"},
            {id:"brow",label:"Brown Noise",ico:"🌊",col:"#7c9fd4"},
            {id:"bina",label:"Binaural",   ico:"🧠",col:"#e07bb5"},
        ];

        let _ci = 0;
        const ch = n => ({id:`c${++_ci}`,n});
        const SUBJECTS = [
            {id:"p",label:"Physics",  ico:"⚛️",col:"#7bc4a0",secs:[
                {s:"Mechanics",       chs:["General Physics","Kinematics","Laws of Motion","Work & Energy","Momentum","Rotation","Gravitation","Fluid Mechanics","Elasticity"].map(ch)},
                {s:"Waves & Thermal", chs:["SHM","Waves & Sound","Kinetic Theory","Thermodynamics","Heat Transfer"].map(ch)},
                {s:"Electromagnetism",chs:["Electrostatics","Capacitors","Current Electricity","Magnetism","EMI","AC Circuits"].map(ch)},
                {s:"Optics & Modern", chs:["Ray Optics","Wave Optics","Modern Physics","Nuclear Physics"].map(ch)},
            ]},
            {id:"c",label:"Chemistry",ico:"🧪",col:"#9b8fc4",secs:[
                {s:"Physical", chs:["Mole Concept","Atomic Structure","Chemical Bonding","States of Matter","Thermodynamics","Equilibrium","Electrochemistry","Chemical Kinetics","Solutions","Surface Chemistry"].map(ch)},
                {s:"Inorganic",chs:["Periodic Table","s-block","p-block I","p-block II","d & f-block","Coordination Chem","Metallurgy","Qualitative Analysis"].map(ch)},
                {s:"Organic",  chs:["Basics & IUPAC","Isomerism","Hydrocarbons","Haloalkanes","Alcohols & Ethers","Aldehydes & Ketones","Carboxylic Acids","Amines","Biomolecules","Polymers","Named Reactions"].map(ch)},
            ]},
            {id:"m",label:"Maths",    ico:"📐",col:"#d4a853",secs:[
                {s:"Algebra",        chs:["Complex Numbers","Theory of Equations","P & C","Binomial Theorem","Sequences & Series","Matrices","Determinants","Probability"].map(ch)},
                {s:"Trigonometry",   chs:["Trig Ratios & Equations","Inverse Trig","Properties of Triangle"].map(ch)},
                {s:"Coord Geometry", chs:["Straight Lines","Circles","Parabola","Ellipse","Hyperbola"].map(ch)},
                {s:"Calculus",       chs:["Limits & Continuity","Differentiation","Applications of Deriv","Integration","Definite Integrals","Diff Equations"].map(ch)},
                {s:"Vectors & 3D",   chs:["Vectors","3D Geometry"].map(ch)},
            ]},
        ];
        const ALL_CHS = SUBJECTS.flatMap(s => s.secs.flatMap(sec => sec.chs));
        const TOT_CHS = ALL_CHS.length;

        const MASTERY = [
            {ico:"○",col:"rgba(255,255,255,0.25)",bg:"transparent",           label:"Not Started"},
            {ico:"◑",col:"#9b8fc4",              bg:"rgba(155,143,196,0.1)",  label:"In Progress"},
            {ico:"◕",col:"#d4a853",              bg:"rgba(212,168,83,0.09)",  label:"Revised"},
            {ico:"●",col:"#7bc4a0",              bg:"rgba(123,196,160,0.1)",  label:"Mastered"},
        ];

        const LEVELS = ["Aspirant","Scholar","Analyst","Expert","Prodigy","Mastermind","Sage","Legend","Omniscient","Enlightened"];
        const LEVEL_ICONS = ["📖","🎓","🔭","💡","🏆","🧠","⭐","🌟","👑","♾️"];
        const lvlOf  = xp => Math.min(Math.floor(Math.sqrt(xp/40)),9);
        const xpForL = l  => l*l*40;
        const lvlPct = xp => { const l=lvlOf(xp),c=xpForL(l),n=xpForL(l+1); return l>=9?1:Math.max(0,(xp-c)/(n-c)); };

        const ACHIEVEMENTS = [
            {id:"a1",ico:"🎯",name:"First Step",   desc:"Complete your first task",     xp:30},
            {id:"a2",ico:"⭐",name:"Perfect Day",  desc:"100% daily completion",        xp:100},
            {id:"a3",ico:"🔥",name:"On Fire",      desc:"3-day streak",                 xp:75},
            {id:"a4",ico:"📚",name:"Week Warrior", desc:"7-day streak",                 xp:200},
            {id:"a5",ico:"🏆",name:"Iron Will",    desc:"30-day streak",                xp:500},
            {id:"a6",ico:"🍅",name:"Focused",      desc:"Complete 10 pomodoros",        xp:80},
            {id:"a7",ico:"🧠",name:"Scholar",      desc:"Master 15 chapters",           xp:150},
            {id:"a8",ico:"🚀",name:"JEE Ready",    desc:"70%+ syllabus mastered",       xp:400},
            {id:"a9",ico:"💎",name:"Perfectionist",desc:"7 perfect days total",         xp:300},
        ];

        // ── Storage Logic ────────────────────────────────────
        const store = {
            async get(k, def) {
                try { const r = await window.storage.get(k); return r.value ? JSON.parse(r.value) : def; }
                catch { return def; }
            },
            set(k,v) { try { window.storage.set(k, JSON.stringify(v)); } catch {} }
        };

        // ── Audio Engine ─────────────────────────────────────
        const buildAudio = () => {
            let ctx=null, master=null, nodes=[];
            const boot = () => {
                if (ctx) return true;
                try {
                    ctx = new (window.AudioContext||window.webkitAudioContext)();
                    master = ctx.createGain(); master.gain.value=0.5; master.connect(ctx.destination);
                    return true;
                } catch { return false; }
            };
            const mkNoise = type => {
                const len=ctx.sampleRate*4, buf=ctx.createBuffer(1,len,ctx.sampleRate), d=buf.getChannelData(0);
                if (type==='br') { let l=0; for(let i=0;i<len;i++){l=(l+0.02*(Math.random()*2-1))/1.02; d[i]=l*3.5;} }
                else { for(let i=0;i<len;i++) d[i]=Math.random()*2-1; }
                const s=ctx.createBufferSource(); s.buffer=buf; s.loop=true; nodes.push(s); return s;
            };
            const mkOsc = (f,t='sine') => { const o=ctx.createOscillator(); o.type=t; o.frequency.value=f; nodes.push(o); return o; };
            const mkGain = v => { const g=ctx.createGain(); g.gain.value=v; nodes.push(g); return g; };
            const mkFilt = (t,f,q=1) => { const fl=ctx.createBiquadFilter(); fl.type=t; fl.frequency.value=f; fl.Q.value=q; nodes.push(fl); return fl; };
            const pipe = (...ns) => { for(let i=0;i<ns.length-1;i++) if(ns[i]&&ns[i+1]) ns[i].connect(ns[i+1]); return ns[ns.length-1]; };
            return {
                stop() { nodes.forEach(n=>{try{n.stop?.();n.disconnect?.();}catch{}}); nodes=[]; },
                setVol(v) { if(master) master.gain.setTargetAtTime(v,ctx.currentTime,0.12); },
                play(id) {
                    if(!boot()) return false;
                    this.stop();
                    if(ctx.state==='suspended') ctx.resume();
                    const M=master;
                    try {
                        if(id==='rain') {
                            const n=mkNoise('wh'); pipe(n,mkFilt('lowpass',1200,0.5),mkGain(0.55),M); n.start();
                            const b=mkNoise('br'); pipe(b,mkFilt('lowpass',200,1),mkGain(0.1),M); b.start();
                        } else if(id==='fire') {
                            const n=mkNoise('br'); pipe(n,mkFilt('lowpass',700,1),mkGain(0.5),M); n.start();
                            const c=mkNoise('wh'); pipe(c,mkFilt('bandpass',2000,10),mkGain(0.05),M); c.start();
                        } else if(id==='frst') {
                            const n=mkNoise('br'); pipe(n,mkFilt('lowpass',380,0.7),mkGain(0.15),M); n.start();
                            [660,880,1100,1320].forEach(f=>{
                                const o=mkOsc(f),g=mkGain(0.007),lfo=mkOsc(0.3+Math.random()*0.4),lg=mkGain(f*0.05);
                                lfo.connect(lg); lg.connect(o.frequency); pipe(o,g,M); o.start(); lfo.start();
                            });
                        } else if(id==='cafe') {
                            const n=mkNoise('br'); pipe(n,mkFilt('bandpass',300,0.4),mkGain(0.18),M); n.start();
                            const c=mkNoise('wh'); pipe(c,mkFilt('highpass',2000,0.5),mkGain(0.03),M); c.start();
                        } else if(id==='brow') {
                            const n=mkNoise('br'); pipe(n,mkGain(0.7),M); n.start();
                        } else if(id==='bina') {
                            const mg=ctx.createChannelMerger(2); mg.connect(M); nodes.push(mg);
                            const oL=mkOsc(200),gL=mkGain(0.25); oL.connect(gL); gL.connect(mg,0,0); oL.start();
                            const oR=mkOsc(240),gR=mkGain(0.25); oR.connect(gR); gR.connect(mg,0,1); oR.start();
                            const n=mkNoise('br'); pipe(n,mkFilt('lowpass',250,1),mkGain(0.06),M); n.start();
                        }
                        return true;
                    } catch { return false; }
                }
            };
        };
        const audioEng = buildAudio();

        // ── Utils ─────────────────────────────────────────────
        const dk  = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        const wkSt= d => { const c=new Date(d); c.setHours(0,0,0,0); c.setDate(c.getDate()+(c.getDay()===0?-6:1-c.getDay())); return c; };
        const isT = d => dk(d)===dk(new Date());
        const isP = d => { const t=new Date(); t.setHours(0,0,0,0); return d < t; };
        const fmt = s => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
        const DS  = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
        const MN  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        const QUOTES = [
            ["The secret of getting ahead is getting started.","Mark Twain"],
            ["Excellence is not a destination but a continuous journey.","Brian Tracy"],
            ["Success is the sum of small efforts, repeated daily.","Robert Collier"],
            ["Don't watch the clock; do what it does. Keep going.","Sam Levenson"],
            ["Hard work beats talent when talent doesn't work hard.","Tim Notke"],
        ];

        // ── Sub-Components ──────────────────────────────────────
        const Ring = ({pct,sz=44,sw=3,col}) => {
            const r=(sz-sw*2)/2, c=2*Math.PI*r, off=c*(1-Math.min(pct,1));
            const clr=col||(pct>=1?"#ffd700":pct>0.5?"#d4a853":"#9b8fc4");
            return (
                <svg width={sz} height={sz} style={{transform:"rotate(-90deg)",flexShrink:0}}>
                    <circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth={sw}/>
                    {pct>0 && <circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke={clr} strokeWidth={sw}
                        strokeDasharray={c} strokeDashoffset={off} strokeLinecap="round"
                        style={{transition:"stroke-dashoffset 0.7s ease"}}/>}
                </svg>
            );
        };

        const Hourglass = ({pct,running,isBreak}) => {
            const col = isBreak ? "#7bc4a0" : "#d4a853";
            const topH = Math.max(0, 68*(1-pct));
            const botH = Math.max(0, 68*pct);
            return (
                <svg viewBox="0 0 80 160" width="80" height="160">
                    <defs>
                        <clipPath id="hct"><polygon points="4,10 76,10 44,82 36,82"/></clipPath>
                        <clipPath id="hcb"><polygon points="36,82 44,82 76,152 4,152"/></clipPath>
                    </defs>
                    <path d="M4,8 L76,8 L44,82 L44,83 L76,154 L4,154 L36,83 L36,82 Z"
                        fill="none" stroke="rgba(212,168,83,0.45)" strokeWidth="1.5" strokeLinejoin="round"/>
                    <line x1="1" y1="8"   x2="79" y2="8"   stroke="rgba(212,168,83,0.85)" strokeWidth="4.5" strokeLinecap="round"/>
                    <line x1="1" y1="154" x2="79" y2="154" stroke="rgba(212,168,83,0.85)" strokeWidth="4.5" strokeLinecap="round"/>
                    <rect x="0" y={82-topH} width="80" height={topH+2} fill={col} opacity="0.72" clipPath="url(#hct)"
                        style={{transition:"y 1s ease,height 1s ease"}}/>
                    <rect x="0" y={152-botH} width="80" height={botH} fill={col} opacity="0.55" clipPath="url(#hcb)"
                        style={{transition:"y 1s ease,height 1s ease"}}/>
                    {running && topH>2 && (
                        <circle cx="40" r="2.2" fill={col}>
                            <animate attributeName="cy" values="82;84" dur="0.55s" repeatCount="indefinite"/>
                            <animate attributeName="opacity" values="0;1;0" dur="0.55s" repeatCount="indefinite"/>
                        </circle>
                    )}
                </svg>
            );
        };

        // ── Main App Component ───────────────────────────────────
        function App() {
            const todayRef = useRef(null);
            if (!todayRef.current) { const d=new Date(); d.setHours(0,0,0,0); todayRef.current=d; }
            const TODAY = todayRef.current;

            const [tab,     setTab]     = useState('home');
            const [sched,   setSched]   = useState({});
            const [week,    setWeek]    = useState(()=>wkSt(new Date()));
            const [selDay,  setSelDay]  = useState(null);
            const [streak,  setStreak]  = useState(0);
            const [pomoCfg, setPomoCfg] = useState(0);
            const [tMode,   setTMode]   = useState('w');
            const [tLeft,   setTLeft]   = useState(POMODOROS[0].work);
            const [running, setRunning] = useState(false);
            const [pomoCount,setPomoCount]=useState(0);
            const tiRef  = useRef(null);
            const pmRef  = useRef(0);
            const [selSubj, setSelSubj] = useState('p');
            const [mastery, setMastery] = useState({});
            const [expSec,  setExpSec]  = useState(null);
            const [mood,    setMood]    = useState(null);
            const [vol,     setVol]     = useState(0.5);
            const [xp,      setXp]      = useState(0);
            const [achiev,  setAchiev]  = useState([]);
            const [toast,   setToast]   = useState(null);
            const [jee,     setJee]     = useState({d:0,h:0,m:0,s:0});
            const [notes,   setNotes]   = useState({});
            const [editNote,setEditNote]= useState(false);
            const [noteTxt, setNoteTxt] = useState('');
            const [loaded,  setLoaded]  = useState(false);
            const [quoteIdx]= useState(()=>Math.floor(Math.random()*QUOTES.length));

            useEffect(()=>{
                (async()=>{
                    const [sc,ms,xv,av,pm,nt]=await Promise.all([
                        store.get('sl_sch',{}), store.get('sl_mst',{}),
                        store.get('sl_xp',0),   store.get('sl_achv',[]),
                        store.get('sl_pm',0),   store.get('sl_notes',{}),
                    ]);
                    setSched(sc); setMastery(ms); setXp(xv); setAchiev(av);
                    setPomoCount(pm); pmRef.current=pm; setNotes(nt);
                    setStreak(calcStr(sc));
                    setLoaded(true);
                })();
            },[]);

            useEffect(()=>{
                const tick=()=>{
                    const diff=JEE_DATE-Date.now();
                    if(diff<=0){setJee({d:0,h:0,m:0,s:0});return;}
                    setJee({d:Math.floor(diff/86400000),h:Math.floor(diff%86400000/3600000),
                             m:Math.floor(diff%3600000/60000),s:Math.floor(diff%60000/1000)});
                };
                tick(); const id=setInterval(tick,1000); return()=>clearInterval(id);
            },[]);

            useEffect(()=>{
                if(running){
                    tiRef.current=setInterval(()=>{
                        setTLeft(prev=>{
                            if(prev<=1){
                                clearInterval(tiRef.current); setRunning(false);
                                if(tMode==='w'){
                                    const np=pmRef.current+1;
                                    setPomoCount(np); pmRef.current=np; store.set('sl_pm',np);
                                    addXP(25); showToast("🍅 Pomodoro done! +25 XP");
                                    setTMode('b'); return POMODOROS[pomoCfg].brk;
                                } else { setTMode('w'); return POMODOROS[pomoCfg].work; }
                            }
                            return prev-1;
                        });
                    },1000);
                } else clearInterval(tiRef.current);
                return()=>clearInterval(tiRef.current);
            },[running,tMode,pomoCfg]);

            const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(null),2600);};
            const addXP=amt=>setXp(p=>{const n=p+amt;store.set('sl_xp',n);return n;});

            const calcStr=sc=>{
                let s=0; const c=new Date(TODAY);
                if((sc[dk(TODAY)]||[]).length/SCHEDULE.length<0.7) c.setDate(c.getDate()-1);
                for(let i=0;i<365;i++){const k=dk(c);if((sc[k]||[]).length/SCHEDULE.length>=0.7){s++;c.setDate(c.getDate()-1);}else break;}
                return s;
            };

            const checkAchv=(sc,ms,str,pm)=>{
                setAchiev(prev=>{
                    const cur=[...prev]; let gained=0; const newN=[];
                    const add=id=>{if(!cur.includes(id)){cur.push(id);const a=ACHIEVEMENTS.find(a=>a.id===id);if(a){gained+=a.xp;newN.push(a.name);}}};
                    if(Object.values(sc).some(a=>a.length>0)) add('a1');
                    if(Object.values(sc).some(a=>a.length>=SCHEDULE.length)) add('a2');
                    if(str>=3) add('a3'); if(str>=7) add('a4'); if(str>=30) add('a5');
                    if(pm>=10) add('a6');
                    if(Object.values(ms).filter(v=>v===3).length>=15) add('a7');
                    if(Object.values(ms).filter(v=>v===3).length/TOT_CHS>=0.7) add('a8');
                    if(Object.values(sc).filter(a=>a.length>=SCHEDULE.length).length>=7) add('a9');
                    if(gained>0){store.set('sl_achv',cur);addXP(gained);if(newN.length) setTimeout(()=>showToast(`🏆 ${newN[0]} unlocked! +${gained} XP`),600);}
                    return cur.length!==prev.length?cur:prev;
                });
            };

            const toggleTask=(dayKey,tid)=>{
                setSched(prev=>{
                    const cur=prev[dayKey]||[], done=cur.includes(tid);
                    const upd=done?cur.filter(x=>x!==tid):[...cur,tid];
                    const ns={...prev,[dayKey]:upd}; store.set('sl_sch',ns);
                    if(!done) addXP(5);
                    const s=calcStr(ns); setStreak(s);
                    checkAchv(ns,mastery,s,pmRef.current);
                    return ns;
                });
            };

            const cycleMastery=cid=>{
                setMastery(prev=>{
                    const cur=prev[cid]||0, nxt=(cur+1)%4, nm={...prev,[cid]:nxt};
                    store.set('sl_mst',nm);
                    const gain=[0,10,20,40][nxt];
                    if(gain>0){addXP(gain);showToast(`+${gain} XP — ${MASTERY[nxt].label}!`);}
                    checkAchv(sched,nm,streak,pmRef.current); return nm;
                });
            };

            const toggleMood=id=>{
                if(mood===id){audioEng.stop();setMood(null);}
                else{const ok=audioEng.play(id);if(ok!==false){setMood(id);audioEng.setVol(vol);}}
            };

            const weekDays=Array.from({length:7},(_,i)=>{const d=new Date(week);d.setDate(d.getDate()+i);return d;});
            const weekEnd=new Date(week); weekEnd.setDate(weekEnd.getDate()+6);
            const selKey=selDay?dk(selDay):null;
            const checked=selKey?sched[selKey]||[]:[];
            const dayPct=key=>(sched[key]||[]).length/SCHEDULE.length;
            const mstCnt=Object.values(mastery).filter(v=>v===3).length;
            const syllPct=mstCnt/TOT_CHS;

                            {SUBJECTS.map(s=>{
                                const t=s.secs.reduce((a,sec)=>a+sec.chs.length,0);
                                const m=s.secs.reduce((a,sec)=>a+sec.chs.filter(c=>(mastery[c.id]||0)===3).length,0);
                                return (
                                    <div key={s.id} onClick={()=>{setSelSubj(s.id);setExpSec(null);}}
                                        style={{flex:1,padding:"9px 4px",textAlign:"center",borderRadius:13,cursor:"pointer",
                                            background:selSubj===s.id?`rgba(${s.id==='p'?'123,196,160':s.id==='c'?'155,143,196':'212,168,83'},0.12)`:G.card,
                                            border:`1px solid ${selSubj===s.id?s.col:G.bdr}`,
                                            color:selSubj===s.id?s.col:"rgba(240,235,224,0.4)"}}>
                                        <div style={{fontSize:20}}>{s.ico}</div>
                                        <div style={{fontSize:10,marginTop:2}}>{s.label}</div>
                                        <div style={{fontSize:9,color:"rgba(240,235,224,0.3)",marginTop:1}}>{m}/{t}</div>
                                    </div>
                                );
                            })}
                        </div>

                        {curS.secs.map(sec=>{
                            const sKey=`${selSubj}_${sec.s}`, exp=expSec===sKey;
                            const secMst=sec.chs.filter(c=>(mastery[c.id]||0)===3).length;
                            return (
                                <div key={sec.s} style={{marginBottom:8}}>
                                    <div onClick={()=>setExpSec(exp?null:sKey)}
                                        style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                                            padding:"11px 13px",cursor:"pointer",borderRadius:12,
                                            background:exp?"rgba(255,255,255,0.055)":G.card,
                                            border:`1px solid ${exp?curS.col:G.bdr}`}}>
                                        <div style={{display:"flex",alignItems:"center",gap:10}}>
                                            <span style={{fontFamily:"Georgia,serif",fontSize:14,color:curS.col}}>{sec.s}</span>
                                        </div>
                                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                                            <span style={{fontSize:10,color:"rgba(240,235,224,0.32)"}}>{secMst}/{sec.chs.length}</span>
                                            <span style={{color:"rgba(240,235,224,0.3)",fontSize:11}}>{exp?"▲":"▼"}</span>
                                        </div>
                                    </div>
                                    {exp&&(
                                        <div style={{background:G.card,border:`1px solid ${G.bdr}`,borderRadius:12,overflow:"hidden",marginTop:4}}>
                                            {sec.chs.map((c,i)=>{
                                                const m=mastery[c.id]||0, mm=MASTERY[m];
                                                return (
                                                    <div key={c.id} onClick={()=>cycleMastery(c.id)}
                                                        style={{display:"flex",alignItems:"center",justifyContent:"space-between",
                                                            padding:"11px 13px",cursor:"pointer",background:mm.bg,
                                                            borderBottom:i<sec.chs.length-1?`1px solid rgba(255,255,255,0.04)`:"none"}}>
                                                        <span style={{fontSize:13,color:m===0?"rgba(240,235,224,0.45)":G.txt,flex:1}}>{c.n}</span>
                                                        <span style={{fontSize:17,color:mm.col}}>{mm.ico}</span>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                );
            };

            const SoundsTab=()=>(
                <div>
                    <div style={{fontFamily:"Georgia,serif",fontSize:18,color:G.gold,marginBottom:16}}>Ambience Player</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:18}}>
                        {MOODS.map(m=>{
                            const active=mood===m.id;
                            return (
                                <div key={m.id} onClick={()=>toggleMood(m.id)}
                                    style={{background:active?`rgba(${m.id==='rain'?'123,196,160':m.id==='fire'?'212,168,83':m.id==='frst'?'93,184,112':m.id==='cafe'?'196,155,123':m.id==='brow'?'124,159,212':'224,123,181'},0.13)`:G.card,
                                        border:`1px solid ${active?m.col:G.bdr}`,borderRadius:16,padding:"16px 12px",
                                        cursor:"pointer",textAlign:"center"}}>
                                    <div style={{fontSize:30,marginBottom:7}}>{m.ico}</div>
                                    <div style={{fontSize:13,fontWeight:500,color:active?m.col:G.txt}}>{m.label}</div>
                                </div>
                            );
                        })}
                    </div>
                    {mood&&(
                        <div style={{background:G.card,border:`1px solid ${G.bdr}`,borderRadius:16,padding:"14px"}}>
                            <input type="range" min="0" max="1" step="0.02" value={vol}
                                onChange={e=>{const v=parseFloat(e.target.value);setVol(v);audioEng.setVol(v);}}
                                style={{width:"100%",accentColor:G.gold,cursor:"pointer"}}/>
                        </div>
                    )}
                </div>
            );

            const StatsTab=()=>(
                <div>
                    <div style={{background:"linear-gradient(135deg,rgba(212,168,83,0.1),rgba(155,143,196,0.07))",
                        border:"1px solid rgba(212,168,83,0.2)",borderRadius:18,padding:"18px",marginBottom:14,textAlign:"center"}}>
                        <div style={{fontSize:44,marginBottom:6}}>{LEVEL_ICONS[level]}</div>
                        <div style={{fontFamily:"Georgia,serif",fontSize:22,color:G.gold}}>{LEVELS[level]}</div>
                        <div style={{fontSize:12,color:"rgba(240,235,224,0.38)",marginTop:2}}>Level {level} · {xp} XP</div>
                    </div>

                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:14}}>
                        {[
                            {v:`${streak}🔥`,l:"Streak",c:G.gold},
                            {v:totalTasks, l:"Tasks Done",c:G.grn},
                            {v:perfDays,   l:"Perfect Days",c:G.pur},
                            {v:pomoCount,  l:"Pomodoros",c:"#c49b7b"},
                        ].map(x=>(
                            <div key={x.l} style={{background:G.card,border:`1px solid ${G.bdr}`,borderRadius:13,padding:"12px",textAlign:"center"}}>
                                <div style={{fontFamily:"Georgia,serif",fontSize:20,color:x.c}}>{x.v}</div>
                                <div style={{fontSize:9,color:"rgba(240,235,224,0.3)",textTransform:"uppercase",letterSpacing:"0.05em",marginTop:2}}>{x.l}</div>
                            </div>
                        ))}
                    </div>

                    <div style={{fontFamily:"Georgia,serif",fontSize:16,color:G.gold,marginBottom:10}}>Achievements</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                        {ACHIEVEMENTS.map(a=>{
                            const earned=achiev.includes(a.id);
                            return (
                                <div key={a.id} style={{background:earned?"rgba(212,168,83,0.07)":G.card,
                                    border:`1px solid ${earned?"rgba(212,168,83,0.22)":G.bdr}`,borderRadius:13,
                                    padding:"12px 10px",opacity:earned?1:0.4}}>
                                    <div style={{fontSize:22,marginBottom:4}}>{a.ico}</div>
                                    <div style={{fontSize:12,fontWeight:500,color:earned?G.gold:G.txt}}>{a.name}</div>
                                    <div style={{fontSize:10,color:"rgba(240,235,224,0.38)",marginTop:2}}>{a.desc}</div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );

            const TABS=[
                {id:'home', ico:'🏠',lbl:'Home'},
                {id:'sched',ico:'📅',lbl:'Schedule'},
                {id:'timer',ico:'⏱',lbl:'Timer'},
                {id:'syll', ico:'📚',lbl:'Syllabus'},
                {id:'sound',ico:'🎵',lbl:'Sounds'},
                {id:'stats',ico:'🏆',lbl:'Profile'},
            ];

            return (
                <div style={{minHeight:"100vh", background:"linear-gradient(160deg,#06090f 0%,#0d1526 55%,#080d1a 100%)",
                    color:"#f0ebe0",fontFamily:"system-ui,-apple-system,sans-serif", overflowX:"hidden",paddingBottom:76}}>

                    <div style={{background:"rgba(0,0,0,0.45)",borderBottom:"1px solid rgba(255,255,255,0.06)",
                        padding:"12px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",
                        position:"sticky",top:0,zIndex:100,backdropFilter:"blur(10px)"}}>
                        <div>
                            <div style={{fontFamily:"Georgia,serif",fontSize:19,color:G.gold}}>Scholar's Log</div>
                            <div style={{fontSize:9,color:"rgba(240,235,224,0.28)",textTransform:"uppercase"}}>JEE Advanced 2027</div>
                        </div>
                        <div style={{background:"rgba(212,168,83,0.1)",border:"1px solid rgba(212,168,83,0.22)",
                            borderRadius:12,padding:"6px 11px",textAlign:"center"}}>
                            <div style={{fontFamily:"Georgia,serif",fontSize:17,color:G.gold,lineHeight:1}}>{streak}🔥</div>
                        </div>
                    </div>

                    <div style={{maxWidth:540,margin:"0 auto",padding:"12px 13px 0"}}>
                        {tab==='home'  && <HomeTab/>}
                        {tab==='sched' && <SchedTab/>}
                        {tab==='timer' && <TimerTab/>}
                        {tab==='syll'  && <SyllabusTab/>}
                        {tab==='sound' && <SoundsTab/>}
                        {tab==='stats' && <StatsTab/>}
                    </div>

                    <div style={{position:"fixed",bottom:0,left:0,right:0, background:"rgba(6,9,15,0.97)",borderTop:"1px solid rgba(255,255,255,0.07)",
                        backdropFilter:"blur(10px)",display:"flex",zIndex:100, paddingBottom:"env(safe-area-inset-bottom,0)"}}>
                        {TABS.map(t=>(
                            <div key={t.id} onClick={()=>setTab(t.id)}
                                style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",
                                    justifyContent:"center",padding:"9px 2px 7px",cursor:"pointer",
                                    color:tab===t.id?G.gold:"rgba(240,235,224,0.34)"}}>
                                <div style={{fontSize:18}}>{t.ico}</div>
                                <div style={{fontSize:8,textTransform:"uppercase"}}>{t.lbl}</div>
                            </div>
                        ))}
                    </div>

                    {toast&&(
                        <div style={{position:"fixed",top:68,left:"50%",transform:"translateX(-50%)",
                            background:"rgba(14,20,38,0.97)",border:"1px solid rgba(212,168,83,0.28)",
                            borderRadius:28,padding:"9px 18px",fontSize:13,color:G.txt,zIndex:300}}>
                            {toast}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
